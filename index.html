    function App() {
      const [scene, setScene] = useState('HOME');
      const [treeStatus, setTreeStatus] = useState('EMPTY');
      const [inventory, setInventory] = useState({ ruby: 10, sapphire: 5, emerald: 5, topaz: 5, diamond: 2 });
      const [showInventory, setShowInventory] = useState(false);
      const [showShop, setShowShop] = useState(false);
      const [purchasedItems, setPurchasedItems] = useState({ hats: [0], hands: [0], catClothes: [0] });
      const [ownedFoods, setOwnedFoods] = useState({ 40: 0, 41: 0, 42: 0, 43: 0, 44: 0 });
      const [catStats, setCatStats] = useState({ hunger: 5, happiness: 5, outfit: 0 });
      const [showStylePopup, setShowStylePopup] = useState(null);

      const [outfit, setOutfit] = useState({
        hairStyle: 0, hairColor: 0, shirtStyle: 0, shirtColor: 0,
        shoesStyle: 0, shoesColor: 0, hatStyle: 0, hatColor: 0,
        handStyle: 0, handColor: 0, faceStyle: 0
      });

      const [isMusicPlaying, setIsMusicPlaying] = useState(false);
      const [customBgmUrl, setCustomBgmUrl] = useState(null);
      const activeAudioRef = useRef(null);
      const nextAudioRef = useRef(null);
      const loopTimerRef = useRef(null);
      const fileInputRef = useRef(null);

      const playSfx = (soundName) => {
        const audio = new Audio(AUDIO_PATHS[soundName]);
        audio.volume = 0.6;
        audio.play().catch(e => console.log('SFX failed:', e));
      };

      const toggleMusic = () => {
        setIsMusicPlaying(!isMusicPlaying);
      };

      const handleAudioUpload = (e) => {
        const file = e.target.files[0];
        if (file) {
          const objectUrl = URL.createObjectURL(file);
          setCustomBgmUrl(objectUrl);
          playSfx('click');
          setIsMusicPlaying(true);
        }
      };

      useEffect(() => {
         const currentUrl = customBgmUrl || AUDIO_PATHS.bgm;
         const CROSSFADE_OFFSET = 2.0;

         if (!isMusicPlaying) {
             if (activeAudioRef.current) activeAudioRef.current.pause();
             if (nextAudioRef.current) nextAudioRef.current.pause();
             clearInterval(loopTimerRef.current);
             return;
         }

         if (!activeAudioRef.current || activeAudioRef.current.src !== new URL(currentUrl, window.location.href).href) {
            if (activeAudioRef.current) activeAudioRef.current.pause();
            if (nextAudioRef.current) nextAudioRef.current.pause();
            nextAudioRef.current = null;
            
            activeAudioRef.current = new Audio(currentUrl);
            activeAudioRef.current.volume = 0.4;
            activeAudioRef.current.play().catch(e => console.log(e));
         } else {
            activeAudioRef.current.play().catch(e => console.log(e));
         }

         loopTimerRef.current = setInterval(() => {
            if (!activeAudioRef.current || isNaN(activeAudioRef.current.duration)) return;
            
            const timeLeft = activeAudioRef.current.duration - activeAudioRef.current.currentTime;
            
            if (timeLeft <= CROSSFADE_OFFSET && !nextAudioRef.current) {
                const next = new Audio(currentUrl);
                next.volume = 0.4;
                next.play().catch(e => console.log(e));
                nextAudioRef.current = next;
            }
            
            if (timeLeft <= 0.2) {
                if (nextAudioRef.current) {
                    activeAudioRef.current.pause();
                    activeAudioRef.current = nextAudioRef.current;
                    nextAudioRef.current = null;
                }
            }
         }, 300);

         return () => clearInterval(loopTimerRef.current);
      }, [isMusicPlaying, customBgmUrl]);

      useEffect(() => {
        const handleFirstClick = () => {
          if (!isMusicPlaying) {
             setIsMusicPlaying(true);
          }
          document.removeEventListener('click', handleFirstClick);
        };
        document.addEventListener('click', handleFirstClick);
        return () => document.removeEventListener('click', handleFirstClick);
      }, [isMusicPlaying]);

      const styleOptions = {
        hairStyle: 15, shirtStyle: 15, shoesStyle: 15, faceStyle: 6,
        colors: [ '#FFD700', '#8B4513', '#2F4F4F', '#FF69B4', '#E6E6FA', '#DC143C', '#FF8C00', '#32CD32', '#1E90FF', '#000000', '#FFFFFF', '#A9A9A9', '#00FFFF', '#FF00FF', '#808000' ]
      };

      const openPopup = (part, title, countOrArray, isColor = false) => {
        playSfx('click');
        let options = [];
        if (isColor) {
           options = styleOptions.colors.map((c, i) => ({ value: i, color: c }));
        } else if (part === 'feed') {
           options = countOrArray.map(id => {
              const info = SHOP_ITEMS.find(i => i.id === parseInt(id));
              return { value: id, label: info ? `${info.name.split(' ')[1]} (${ownedFoods[id]}개)` : '먹이' };
           });
        } else if (Array.isArray(countOrArray)) {
           options = countOrArray.map(id => {
              let label = id === 0 ? '기본' : id;
              if (part === 'hatStyle' && EMOJI_HATS[id]) label = EMOJI_HATS[id];
              else if (part === 'handStyle' && EMOJI_HANDS[id]) label = EMOJI_HANDS[id];
              else if (id > 0) label = '아이템 ' + id;
              return { value: id, label };
           });
        } else {
           options = Array.from({length: countOrArray}).map((_, i) => ({ value: i, label: String(i+1) }));
        }
        setShowStylePopup({ part, title, options });
      };


      const getRenderOutfit = (customOutfit = outfit) => ({
        ...customOutfit,
        hairColor: styleOptions.colors[customOutfit.hairColor],
        shirtColor: styleOptions.colors[customOutfit.shirtColor],
        shoesColor: styleOptions.colors[customOutfit.shoesColor],
        hatColor: styleOptions.colors[customOutfit.hatColor],
        handColor: styleOptions.colors[customOutfit.handColor]
      });

      const merchantOutfit = {
        hairStyle: 11, hairColor: 3, shirtStyle: 4, shirtColor: 10,
        shoesStyle: 5, shoesColor: 5, hatStyle: 8, hatColor: 10, handStyle: 0, handColor: 0, faceStyle: 2
      };

      useEffect(() => {
        const savedInv = localStorage.getItem('rainbow_island_inventory_v3');
        const savedPurchased = localStorage.getItem('rainbow_island_purchased_v3');
        if (savedInv) try { setInventory(JSON.parse(savedInv)); } catch (e) {}
        if (savedPurchased) try { setPurchasedItems(JSON.parse(savedPurchased)); } catch (e) {}
        const savedCat = localStorage.getItem('rainbow_island_cat');
        if (savedCat) try { setCatStats(JSON.parse(savedCat)); } catch (e) {}
        const savedFoods = localStorage.getItem('rainbow_island_foods');
        if (savedFoods) try { setOwnedFoods(JSON.parse(savedFoods)); } catch (e) {}
      }, []);

      useEffect(() => {
        localStorage.setItem('rainbow_island_inventory_v3', JSON.stringify(inventory));
        localStorage.setItem('rainbow_island_purchased_v3', JSON.stringify(purchasedItems));
        localStorage.setItem('rainbow_island_cat', JSON.stringify(catStats));
        localStorage.setItem('rainbow_island_foods', JSON.stringify(ownedFoods));
      }, [inventory, purchasedItems, catStats, ownedFoods]);

      useEffect(() => {
        let timer;
        if (scene === 'SLIDE_IN') timer = setTimeout(() => setScene('ISLAND'), 4000);
        else if (scene === 'SLIDE_OUT') timer = setTimeout(() => { setScene('HOME'); setTreeStatus('EMPTY'); }, 4000);
        return () => clearTimeout(timer);
      }, [scene]);

      useEffect(() => {
        const catTimer = setInterval(() => {
          setCatStats(prev => ({
            ...prev,
            hunger: Math.max(0, prev.hunger - 1),
            happiness: Math.max(0, prev.happiness - 1)
          }));
        }, 60000);
        return () => clearInterval(catTimer);
      }, []);

      const buyFood = (foodItem) => {
        if (inventory[foodItem.currency] >= foodItem.price) {
          playSfx('buy');
          setInventory(prev => ({ ...prev, [foodItem.currency]: prev[foodItem.currency] - foodItem.price }));
          setOwnedFoods(prev => ({ ...prev, [foodItem.id]: (prev[foodItem.id] || 0) + 1 }));
        } else {
          playSfx('click');
          setTimeout(() => alert(`${foodItem.currency} 보석이 부족합니다!`), 50);
        }
      };

      const useFood = (foodId) => {
        if (ownedFoods[foodId] > 0) {
          playSfx('click');
          setOwnedFoods(prev => ({ ...prev, [foodId]: prev[foodId] - 1 }));
          setCatStats(prev => ({ ...prev, hunger: Math.min(10, prev.hunger + 1) }));
          setShowStylePopup(null);
        }
        else {
           setTimeout(() => alert("해당 먹이가 부족합니다. 구름 섬 상점에서 구매해 오세요!"), 50);
        }
      };

      const petCat = () => {
        playSfx('click');
        setCatStats(prev => ({ ...prev, happiness: Math.min(10, prev.happiness + 1) }));
      };

      const handleWaterTree = () => {
        if (treeStatus !== 'EMPTY') return;
        playSfx('water');
        setTreeStatus('WATERED');
        setTimeout(() => { setTreeStatus('READY'); }, 2500);
      };

      const handleCollectGems = () => {
        if (treeStatus !== 'READY') return;
        playSfx('collect');
        const types = Object.keys(inventory);
        const newInventory = { ...inventory };
        const dropCount = Math.floor(Math.random() * 3) + 3;
        for(let i=0; i<dropCount; i++) {
          const randomType = Math.random() > 0.85 ? 'diamond' : types[Math.floor(Math.random() * 4)];
          newInventory[randomType]++;
        }
        setInventory(newInventory);
        setTreeStatus('EMPTY');
      };

      const changeStyle = (part) => {
        playSfx('click');
        setOutfit(prev => {
          const limit = part.includes('Color') ? styleOptions.colors.length : styleOptions[part];
          return { ...prev, [part]: (prev[part] + 1) % limit };
        });
      };

      const changeOwnedStyle = (part) => {
        playSfx('click');
        const ownedArray = purchasedItems[part];
        const targetKey = part === 'hats' ? 'hatStyle' : 'handStyle';
        setOutfit(prev => {
          const currentIndex = ownedArray.indexOf(prev[targetKey]);
          const nextIndex = currentIndex === -1 ? 0 : (currentIndex + 1) % ownedArray.length;
          return { ...prev, [targetKey]: ownedArray[nextIndex] };
        });
      };

      const handlePurchase = (item) => {
        const catMap = item.type === 'hatStyle' ? 'hats' : item.type === 'catClothes' ? 'catClothes' : 'hands'; if (purchasedItems[catMap] && purchasedItems[catMap].includes(item.id)) return;
        if (inventory[item.currency] >= item.price) {
          playSfx('buy');
          setInventory(prev => ({ ...prev, [item.currency]: prev[item.currency] - item.price }));
          setPurchasedItems(prev => {
            const category = item.type === 'hatStyle' ? 'hats' : item.type === 'catClothes' ? 'catClothes' : 'hands';
            return { ...prev, [category]: [...prev[category], item.id] };
          });
        } else {
          playSfx('click');
          setTimeout(() => alert(`${item.currency} 보석이 부족합니다! 나무를 키워 모아오세요.`), 50);
        }
      };

      const totalGems = Object.values(inventory).reduce((a, b) => a + b, 0);

      const renderCloudEffects = () => {
        return Array.from({ length: 12 }).map((_, i) => (
          <div key={i} className="fluffy-cloud text-white opacity-80"
            style={{ '--speed': `${2 + Math.random() * 3}s`, '--delay': `-${Math.random() * 3}s`, '--size': `${3 + Math.random() * 4}rem`, '--y-offset': `${Math.random() * 100}vh`, filter: 'drop-shadow(0px 10px 15px rgba(255,255,255,0.8))' }}>
            ☁️
          </div>
        ));
      };

      return (
        <div className="relative w-full h-screen overflow-hidden bg-gradient-to-b from-sky-200 to-blue-300 font-sans select-none" onClick={() => !isMusicPlaying && bgmRef.current?.play()}>
          
          <div className="absolute top-6 right-6 flex items-center gap-4 z-[60]">
            <input type="file" accept="audio/mp3, audio/mpeg, audio/ogg, audio/wav" ref={fileInputRef} style={{ display: 'none' }} onChange={handleAudioUpload} />
            <button onClick={(e) => { e.stopPropagation(); fileInputRef.current?.click(); }} className="bg-white/90 px-4 py-3 rounded-full shadow-lg border-2 border-indigo-300 hover:scale-105 transition text-sm font-bold flex items-center gap-2 text-indigo-600" title="직접 만든 MP3 파일을 배경음악으로 설정합니다">
              🎵 음악 변경
            </button>
            <button onClick={(e) => { e.stopPropagation(); toggleMusic(); playSfx('click'); }} className="bg-white/90 p-3 rounded-full shadow-lg border-2 border-pink-300 hover:scale-105 transition">
              <SoundIcon muted={!isMusicPlaying} />
            </button>
            <button onClick={(e) => { e.stopPropagation(); setShowInventory(true); playSfx('click'); }} className="bg-white/90 px-5 py-3 rounded-full shadow-lg font-bold text-gray-700 flex items-center gap-3 text-xl border-2 border-pink-300 hover:scale-105 transition">
              <GemIcons.ruby size={8} /> {totalGems}개 가방
            </button>
          </div>

          {showInventory && (
            <div className="absolute inset-0 bg-black/40 z-[100] flex items-center justify-center p-4 backdrop-blur-sm" onClick={(e) => e.stopPropagation()}>
              <div className="bg-white rounded-3xl p-8 max-w-md w-full shadow-2xl relative">
                <button onClick={() => { setShowInventory(false); playSfx('click'); }} className="absolute top-4 right-4 text-gray-400 hover:text-gray-800 text-3xl font-bold">&times;</button>
                <h2 className="text-2xl font-extrabold text-center mb-6 text-indigo-600">내 보석 가방</h2>
                <div className="grid grid-cols-2 gap-4">
                  {Object.entries(inventory).map(([key, count]) => {
                    const Icon = GemIcons[key];
                    const labels = { ruby: '루비', sapphire: '사파이어', emerald: '에메랄드', topaz: '토파즈', diamond: '다이아몬드' };
                    return (
                      <div key={key} className="flex flex-col items-center bg-gray-50 p-4 rounded-2xl border border-gray-100 shadow-sm">
                        <Icon size={10} />
                        <span className="mt-2 font-bold text-gray-600">{labels[key]}</span>
                        <span className="text-xl font-extrabold text-indigo-500">{count}개</span>
                      </div>
                    );
                  })}
                </div>
              </div>
            </div>
          )}

          {showShop && (
            <div className="absolute inset-0 bg-black/40 z-[100] flex items-center justify-center p-4 backdrop-blur-sm" onClick={() => { setShowShop(false); playSfx('click'); }}>
              <div className="bg-white rounded-3xl p-6 md:p-8 max-w-3xl w-full shadow-2xl relative max-h-[90vh] overflow-y-auto">
                <button onClick={() => { setShowShop(false); playSfx('click'); }} className="absolute top-4 right-4 text-gray-400 hover:text-gray-800 text-3xl font-bold">&times;</button>
                <h2 className="text-3xl font-extrabold text-center mb-2 text-pink-500">구름 섬 잡화점 ☁️</h2>
                <p className="text-center text-gray-500 mb-6 font-bold">"예쁜 물건을 구경하세요! 보석으로 교환해 드려요."</p>
                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                  {SHOP_ITEMS.map((item, idx) => {
                    const isOwned = item.type !== 'catFood' && purchasedItems[item.type === 'catClothes' ? 'catClothes' : item.type === 'hatStyle' ? 'hats' : 'hands']?.includes(item.id);
                    const CurrencyIcon = GemIcons[item.currency];
                    const canAfford = inventory[item.currency] >= item.price;
                    return (
                      <div key={idx} className="flex items-center justify-between bg-blue-50 p-4 rounded-2xl border-2 border-blue-100">
                        <div>
                          <h3 className="font-bold text-lg text-gray-800">{item.name}</h3>
                          <p className="text-sm text-gray-500">{item.desc}</p>
                        </div>
                        {isOwned ? (
                          <div className="px-4 py-2 bg-gray-200 text-gray-500 font-bold rounded-xl">보유중</div>
                        ) : (
                          <button onClick={() => item.type === 'catFood' ? buyFood(item) : handlePurchase(item)} className={`flex items-center gap-2 px-4 py-2 font-bold rounded-xl shadow transition ${canAfford ? 'bg-pink-400 hover:bg-pink-500 text-white' : 'bg-gray-300 text-gray-500 cursor-not-allowed'}`}>
                            {item.price} <CurrencyIcon size={5} />
                          </button>
                        )}
                      </div>
                    );
                  })}
                </div>
              </div>
            </div>
          )}

          {showStylePopup && (
            <div className="absolute inset-0 bg-black/40 z-[100] flex items-center justify-center p-4 backdrop-blur-sm" onClick={(e) => e.stopPropagation()}>
              <div className="bg-white rounded-3xl p-6 md:p-8 max-w-lg w-full shadow-2xl relative max-h-[80vh] flex flex-col">
                <button onClick={() => { setShowStylePopup(null); playSfx('click'); }} className="absolute top-4 right-4 text-gray-400 hover:text-gray-800 text-3xl font-bold">&times;</button>
                <h2 className="text-2xl font-extrabold text-center mb-6 text-indigo-600">
                  {showStylePopup.title} 선택
                </h2>
                <div className="overflow-y-auto pr-2 custom-scrollbar grid grid-cols-4 md:grid-cols-5 gap-3">
                  {showStylePopup.options.map((opt, idx) => (
                    <button 
                      key={idx}
                      onClick={() => {
                         playSfx('click');
                         if (showStylePopup.part === 'outfit') {
                            setCatStats(prev => ({ ...prev, outfit: opt.value }));
                         } else if (showStylePopup.part === 'feed') {
                            useFood(opt.value);
                         } else {
                            setOutfit(prev => ({ ...prev, [showStylePopup.part]: opt.value }));
                         }
                         if (showStylePopup.part !== 'feed') setShowStylePopup(null);
                      }}
                      className={`${opt.color ? "h-14" : "h-24"} rounded-2xl flex flex-col items-center justify-center shadow-sm border-2 transition hover:scale-110 active:scale-95 flex-shrink-0 overflow-hidden relative ${outfit[showStylePopup.part] === opt.value ? 'border-indigo-500 bg-indigo-50 ring-2 ring-indigo-200' : 'border-gray-200 bg-gray-50 hover:border-indigo-300'}`}
                      style={opt.color ? { backgroundColor: opt.color } : {}}
                    >
                      {opt.color ? null : 
                        (showStylePopup.part === 'feed' || showStylePopup.part === 'outfit' || showStylePopup.part.includes('Color')) ? 
                        <span className="text-sm font-bold text-gray-700">{opt.label}</span> : 
                        <div className="absolute top-2 w-[100px] h-[150px] transform scale-[0.4] origin-top flex justify-center">
                          <Character outfit={getRenderOutfit({...outfit, [showStylePopup.part]: opt.value})} scale={1} />
                        </div>
                      }
                      {!opt.color && !showStylePopup.part.includes('Color') && showStylePopup.part !== 'feed' && showStylePopup.part !== 'outfit' && (
                         <span className="absolute bottom-1 text-[10px] font-bold text-gray-400 bg-white/80 px-1 rounded">{opt.label}</span>
                      )}
                    </button>
                  ))}
                </div>
              </div>
            </div>
          )}


          {scene === 'HOME' && (
            <div className="w-full h-full flex flex-col items-center justify-center relative z-10 px-4">
              <h1 className="text-5xl font-extrabold text-white drop-shadow-md mb-8 tracking-wider">무지개 구름 섬</h1>
              <div className="bg-white/50 p-6 md:p-8 rounded-3xl shadow-2xl flex flex-col lg:flex-row items-center gap-8 backdrop-blur-md border border-white/60 w-full max-w-5xl">
                <div className="flex flex-col xl:flex-row gap-6 items-center">
                  <div className="flex-shrink-0 bg-white/70 px-6 pt-4 pb-6 rounded-2xl shadow-inner floating relative flex justify-center items-center mb-8 xl:mb-0">
                    <div className="transform -translate-y-4">
                      <Character outfit={getRenderOutfit()} scale={1.8} />
                    </div>
                  </div>
                  
                  {/* 패밀리 펫 고양이 영역 */}
                  <div className="bg-white/90 p-4 rounded-3xl shadow-lg border-2 border-pink-200 flex flex-col items-center relative min-w-[300px]">
                    <h3 className="text-lg font-bold text-gray-700 absolute top-2 left-4">내 고양이 🐾</h3>
                    <div className="flex gap-2 mt-8 mb-2 w-full px-2 text-sm font-bold text-gray-600 justify-around whitespace-nowrap">
                       <div className="flex flex-col items-center">
                         <span>🍖 배고픔: {catStats.hunger}/10</span>
                         <div className="w-24 bg-gray-200 h-2 rounded-full overflow-hidden mt-1"><div className="bg-orange-400 h-full" style={{width: `${catStats.hunger*10}%`}}></div></div>
                       </div>
                       <div className="flex flex-col items-center">
                         <span>💖 행복도: {catStats.happiness}/10</span>
                         <div className="w-24 bg-gray-200 h-2 rounded-full overflow-hidden mt-1"><div className="bg-pink-400 h-full" style={{width: `${catStats.happiness*10}%`}}></div></div>
                       </div>
                    </div>
                    
                    <div onClick={petCat} title="고양이를 쓰다듬어 행복도를 올려주세요!">
                       <Cat hunger={catStats.hunger} happiness={catStats.happiness} outfit={catStats.outfit} isHappy={catStats.hunger >= 8 && catStats.happiness >= 8} />
                    </div>

                    <div className="flex gap-2 mt-4 mt-2">
                      <button onClick={() => openPopup('feed', '먹이 주기', Object.keys(ownedFoods))} className="px-3 py-1.5 bg-yellow-400 hover:bg-yellow-500 text-white rounded-xl font-bold shadow-sm text-xs">먹이 주기</button>
                      <button onClick={() => openPopup('outfit', '고양이 옷', purchasedItems.catClothes)} className="px-3 py-1.5 bg-purple-400 hover:bg-purple-500 text-white rounded-xl font-bold shadow-sm text-xs border border-purple-500">옷 갈아입히기</button>
                    </div>
                  </div>
                </div>
                <div className="flex-grow flex flex-col gap-5 w-full">
                  <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-3">
                    <div className="flex flex-col gap-2">
                       <span className="text-xs font-bold text-gray-700 text-center">헤어 (15종)</span>
                       <button onClick={() => openPopup('hairStyle', '헤어 스타일', styleOptions.hairStyle)} className="py-2 bg-yellow-400 hover:bg-yellow-500 rounded-xl text-white font-bold shadow text-sm">스타일 고르기</button>
                       <button onClick={() => openPopup('hairColor', '헤어 색상', null, true)} className="py-2 bg-yellow-100 hover:bg-yellow-200 rounded-xl text-yellow-800 font-bold shadow text-sm border border-yellow-300">색상 고르기</button>
                    </div>
                    <div className="flex flex-col gap-2">
                       <span className="text-xs font-bold text-gray-700 text-center">표정 (6종)</span>
                       <button onClick={() => openPopup('faceStyle', '얼굴 표정', styleOptions.faceStyle)} className="py-2 bg-green-400 hover:bg-green-500 rounded-xl text-white font-bold shadow text-sm h-full">표정 고르기</button>
                    </div>
                    <div className="flex flex-col gap-2">
                       <span className="text-xs font-bold text-gray-700 text-center">의상 (15종)</span>
                       <button onClick={() => openPopup('shirtStyle', '의상 스타일', styleOptions.shirtStyle)} className="py-2 bg-blue-400 hover:bg-blue-500 rounded-xl text-white font-bold shadow text-sm">스타일 고르기</button>
                       <button onClick={() => openPopup('shirtColor', '의상 색상', null, true)} className="py-2 bg-blue-100 hover:bg-blue-200 rounded-xl text-blue-800 font-bold shadow text-sm border border-blue-300">색상 고르기</button>
                    </div>
                    <div className="flex flex-col gap-2">
                       <span className="text-xs font-bold text-gray-700 text-center">신발 (15종)</span>
                       <button onClick={() => openPopup('shoesStyle', '신발 스타일', styleOptions.shoesStyle)} className="py-2 bg-purple-400 hover:bg-purple-500 rounded-xl text-white font-bold shadow text-sm">스타일 고르기</button>
                       <button onClick={() => openPopup('shoesColor', '신발 색상', null, true)} className="py-2 bg-purple-100 hover:bg-purple-200 rounded-xl text-purple-800 font-bold shadow text-sm border border-purple-300">색상 고르기</button>
                    </div>
                    <div className="flex flex-col gap-2">
                       <span className="text-xs font-bold text-pink-600 text-center">모자 (구매품)</span>
                       <button onClick={() => openPopup('hatStyle', '보유 모자', purchasedItems.hats)} className="py-2 bg-pink-400 hover:bg-pink-500 rounded-xl text-white font-bold shadow text-sm">보유 목록</button>
                       <button onClick={() => openPopup('hatColor', '모자 색상', null, true)} className="py-2 bg-pink-100 hover:bg-pink-200 rounded-xl text-pink-800 font-bold shadow text-sm border border-pink-300">색상 고르기</button>
                    </div>
                    <div className="flex flex-col gap-2 col-span-2 md:col-span-1">
                       <span className="text-xs font-bold text-pink-600 text-center">손 물건 (구매품)</span>
                       <button onClick={() => openPopup('handStyle', '보유 손물건', purchasedItems.hands)} className="py-2 bg-orange-400 hover:bg-orange-500 rounded-xl text-white font-bold shadow text-sm">보유 목록</button>
                       <button onClick={() => openPopup('handColor', '손물건 색상', null, true)} className="py-2 bg-orange-100 hover:bg-orange-200 rounded-xl text-orange-800 font-bold shadow text-sm border border-orange-300">색상 고르기</button>
                    </div>
                  </div>
                  <button onClick={() => { setScene('SLIDE_IN'); playSfx('slide'); }} className="w-full py-4 mt-2 bg-gradient-to-r from-pink-400 via-purple-400 to-indigo-400 text-white text-2xl font-bold rounded-2xl shadow-xl hover:scale-[1.02] transition animate-pulse border-4 border-white">
                    무지개 다리 건너기 🌈
                  </button>
                </div>
              </div>
            </div>
          )}

          {(scene === 'SLIDE_IN' || scene === 'SLIDE_OUT') && (
            <div className="w-full h-full flex flex-col items-center justify-center relative bg-gradient-to-b from-sky-300 to-blue-200 transition-colors duration-1000">
              <div className="absolute inset-0 z-0 pointer-events-none">{renderCloudEffects()}</div>
              <div className={`absolute w-[300%] h-80 rainbow-slide shadow-[0_20px_50px_rgba(255,105,180,0.3)] z-10 ${scene === 'SLIDE_IN' ? 'rotate-45' : '-rotate-45 -scale-x-100'}`}></div>
              <div className="z-20 floating drop-shadow-2xl flex items-end gap-12">
                <Character outfit={getRenderOutfit()} scale={2.2} isSliding={true} />
                <div className="transform -translate-y-16 animate-pulse">
                  <Cat hunger={catStats.hunger} happiness={catStats.happiness} outfit={catStats.outfit} isHappy={true} />
                </div>
              </div>
              <h2 className="absolute bottom-24 text-4xl font-extrabold text-white drop-shadow-[0_4px_4px_rgba(0,100,200,0.4)] z-30 tracking-widest animate-bounce px-6 py-2 bg-white/20 rounded-full backdrop-blur-sm border border-white/50">
                {scene === 'SLIDE_IN' ? '무지개 다리를 타고 날아가는 중~ ☁️' : '무지개 미끄럼틀로 돌아가는 중~ 🌈'}
              </h2>
            </div>
          )}

          {scene === 'ISLAND' && (
            <div className="w-full h-full flex flex-col items-center justify-end pb-24 relative">
              <div className="absolute top-1/4 left-0 w-full h-40 rainbow-slide opacity-40 -rotate-12 blur-sm z-0"></div>
              <div className="absolute bottom-10 w-[90vw] max-w-[1000px] h-[400px] cloud-platform rounded-[50%] z-0 border-t-8 border-white/80"></div>
              
              <div className="z-10 flex flex-col items-center relative bottom-16">
                <Tree status={treeStatus} />
                <div className="h-20 mt-8 flex items-center justify-center">
                  {treeStatus === 'EMPTY' && (
                    <button onClick={handleWaterTree} className="px-8 py-4 bg-blue-500 text-white text-xl font-bold rounded-full shadow-[0_8px_0_#2563EB] hover:bg-blue-600 hover:translate-y-1 hover:shadow-[0_4px_0_#2563EB] active:translate-y-2 active:shadow-none transition flex items-center gap-3">
                      <WaterIcon /> 크리스탈 나무에 물주기
                    </button>
                  )}
                  {treeStatus === 'WATERED' && (
                    <div className="px-8 py-4 bg-sky-400 text-white text-xl font-bold rounded-full shadow-inner flex items-center gap-3 animate-pulse">
                      보석이 영롱하게 자라나는 중... ✨
                    </div>
                  )}
                  {treeStatus === 'READY' && (
                    <button onClick={handleCollectGems} className="px-8 py-4 bg-pink-500 text-white text-xl font-bold rounded-full shadow-[0_8px_0_#DB2777] hover:bg-pink-600 hover:translate-y-1 hover:shadow-[0_4px_0_#DB2777] active:translate-y-2 active:shadow-none transition flex items-center gap-3 animate-bounce border-2 border-pink-300">
                      <GemIcons.ruby size={6} /> 쏟아지는 보석 담기!
                    </button>
                  )}
                </div>
              </div>

              <div className="absolute bottom-48 left-[10%] md:left-[20%] z-20 flex items-end gap-6">
                 <Character outfit={getRenderOutfit()} scale={1.2} />
                 <div className="pb-4 transform animate-bounce">
                    <Cat hunger={catStats.hunger} happiness={catStats.happiness} outfit={catStats.outfit} isHappy={catStats.hunger >= 8 && catStats.happiness >= 8} />
                 </div>
              </div>

              <div className="absolute bottom-52 right-[10%] md:right-[20%] z-20 flex flex-col items-center merchant-float">
                 <button onClick={() => { setShowShop(true); playSfx('click'); }} className="mb-4 px-4 py-2 bg-white text-pink-500 font-extrabold rounded-full shadow-lg border-2 border-pink-200 hover:scale-110 transition animate-bounce cursor-pointer flex items-center gap-2">
                   🛍️ 상점 열기
                 </button>
                 <Character outfit={getRenderOutfit(merchantOutfit)} scale={1.1} />
              </div>

              <div className="absolute bottom-8 left-1/2 transform -translate-x-1/2 z-30 w-full px-4 text-center">
                <button onClick={() => { setScene('SLIDE_OUT'); playSfx('slide'); }} className="px-8 py-4 bg-purple-500 text-white text-xl font-bold rounded-full shadow-[0_8px_0_#7E22CE] hover:bg-purple-600 hover:translate-y-1 hover:shadow-[0_4px_0_#7E22CE] active:translate-y-2 active:shadow-none transition border-2 border-purple-300">
                  무지개 다리 타고 집으로 돌아가기 🌈
                </button>
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
